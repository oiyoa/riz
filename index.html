<body>

  <noscript>
    <div class="banner-danger">
      برای استفاده از این برنامه، جاوا اسکریپت مرورگر خود را فعال کنید. این برنامه بدون جاوا اسکریپت کار نمی‌کند.
    </div>
  </noscript>

  <svg style="display:none">
    <symbol id="i-key" viewBox="0 0 24 24">
      <rect x="3" y="10" width="18" height="10" rx="2" stroke="currentColor" fill="none" stroke-width="2"/>
      <path d="M12 10V6a2 2 0 1 1 4 0v4" stroke="currentColor" fill="none" stroke-width="2"/>
    </symbol>
    <symbol id="i-copy" viewBox="0 0 24 24">
      <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
      <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
    </symbol>
    <symbol id="i-check" viewBox="0 0 24 24">
      <path d="M20 6 9 17l-5-5"></path>
    </symbol>
    <symbol id="i-extract" viewBox="0 0 24 24">
      <rect x="3" y="12" width="18" height="9" rx="1" stroke="currentColor" fill="none" stroke-width="2"/>
      <path d="M12 14V4 M8 8l4-4 4 4" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="i-file" viewBox="0 0 24 24">
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
      <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
    </symbol>
    <symbol id="i-msg" viewBox="0 0 24 24">
      <path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"></path>
    </symbol>
    <symbol id="i-compress" viewBox="0 0 24 24">
      <rect x="3" y="14" width="18" height="7" rx="1" stroke="currentColor" fill="none" stroke-width="2"/>
      <path d="M12 3v11 M8 9l4 5 4-5" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="i-eye" viewBox="0 0 24 24">
      <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"></path>
      <circle cx="12" cy="12" r="3"></circle>
    </symbol>
    <symbol id="i-eye-off" viewBox="0 0 24 24">
      <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
      <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
      <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
      <line x1="2" x2="22" y1="2" y2="22"></line>
    </symbol>
  </svg>

  <main class="container">

    <div class="tab-bar">
      <button id="tab-text" class="tab-btn active" type="button">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <use href="#i-msg" />
        </svg>
        متن
      </button>
      <button id="tab-file" class="tab-btn" type="button">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <use href="#i-file" />
        </svg>
        فایل
      </button>

    </div>
    <!-- ===== GLOBAL PASSWORD UI ===== -->
    <div id="password-status-banner" class="field banner-info">
      <svg viewBox="0 0 24 24" width="32" height="32" class="banner-info-icon">
        <use href="#i-key" />
      </svg>
      <p class="banner-info-text">برای استفاده از برنامه، کلید اختصاصی را تنظیم کنید.</p>
      <button id="btn-setup-password" class="btn primary btn-setup">تنظیم کلید</button>
    </div>

    <div id="password-inline-box" class="field hidden password-box">
      <h3 class="password-box-title">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <use href="#i-key" />
        </svg>
        کلید فشرده‌سازی
      </h3>
      <p class="password-box-desc" id="password-box-desc">
        برای ادامه، لطفاً کلید فشرده‌سازی را وارد کنید.
      </p>
      <div class="field password-input-wrap">
        <input type="password" id="password-input-box" placeholder="کلید اختصاصی" class="password-input" autocomplete="off" />
        <button id="btn-toggle-password" class="btn-icon btn-toggle-pwd" type="button" aria-label="نمایش کلید">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <use href="#i-eye" />
          </svg>
        </button>
      </div>
      <div class="actions password-actions">
        <button id="btn-save-password" class="btn primary">تأیید</button>
        <button id="btn-cancel-password" class="btn secondary">انصراف</button>
      </div>
    </div>
    <!-- ===== MESSAGE PANEL ===== -->
    <div id="panel-text">
      <div class="field">
        <div class="field-header">
          <label for="input-text">متن</label>
          <button id="btn-settings-text" class="btn secondary hidden btn-settings-small">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <use href="#i-key" />
            </svg>
            <span>تغییر کلید</span>
          </button>
        </div>
        <div class="actions input-actions">
          <button id="btn-paste-large" class="btn secondary">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path d="M11 14h10"></path>
              <path d="M16 4h2a2 2 0 0 1 2 2v1.344"></path>
              <path d="m17 18 4-4-4-4"></path>
              <path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 1.793-1.113"></path>
              <rect x="8" y="2" width="8" height="4" rx="1"></rect>
            </svg>
            <span>چسباندن (Paste)</span>
          </button>
          <button id="btn-clear" class="btn secondary" disabled>
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path
                d="M21 21H8a2 2 0 0 1-1.42-.587l-3.994-3.999a2 2 0 0 1 0-2.828l10-10a2 2 0 0 1 2.829 0l5.999 6a2 2 0 0 1 0 2.828L12.834 21">
              </path>
              <path d="m5.082 11.09 8.828 8.828"></path>
            </svg>
            <span>پاک کردن</span>
          </button>
        </div>
        <textarea id="input-text" placeholder="متن خود را بنویسید یا متن فشرده‌شده را بچسبانید..."></textarea>
      </div>

      <div class="actions">
        <button id="btn-encrypt" class="btn primary">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <use href="#i-compress" />
          </svg>
          <span>فشرده‌سازی</span>
        </button>
        <button id="btn-decrypt" class="btn secondary">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <use href="#i-extract" />
          </svg>
          <span>استخراج</span>
        </button>
      </div>

      <div id="error-msg" class="error hidden"></div>

      <div class="output-group hidden" id="output-container">
        <label for="output-text">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <use href="#i-msg" />
          </svg>
          نتیجه
        </label>
        <div class="copy-wrap">
          <textarea id="output-text" readonly></textarea>
          <button id="btn-copy" class="btn-copy" aria-label="کپی">
            <svg viewBox="0 0 24 24">
              <use href="#i-copy" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- ===== FILE PANEL ===== -->
    <div id="panel-file" class="hidden">
      <div class="field" id="file-pick-section">
        <div class="field-header">
          <label>
            <svg viewBox="0 0 24 24" width="18" height="18">
              <use href="#i-file" />
            </svg>
            انتخاب فایل
          </label>
          <div style="display: flex; gap: 8px;">
            <button id="btn-file-clear" class="btn secondary hidden btn-settings-small" type="button">
              <span>پاک کردن</span>
            </button>
            <button id="btn-settings-file" class="btn secondary hidden btn-settings-small" type="button">
              <svg viewBox="0 0 24 24" width="14" height="14">
                <use href="#i-key" />
              </svg>
              <span>تغییر کلید</span>
            </button>
          </div>
        </div>
        <input type="file" id="file-input" multiple accept="*/*" class="file-input-native" />
        <div id="file-info" class="file-info hidden"></div>
      </div>

      <div class="field" id="split-section">
        <label class="split-label" for="split-toggle">
          <input type="checkbox" id="split-toggle" />
          <span>تقسیم به چند فایل کوچک تر</span>
        </label>
        <div id="split-controls" class="split-controls hidden">
          <input type="range" id="split-slider" min="1" max="50" value="5" />
          <div class="split-value-wrap">
            <input type="number" id="split-input" min="1" max="50" value="5" />
            <span class="split-unit">مگابایت</span>
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="btn-file-compress" class="btn primary" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20">
            <use href="#i-compress" />
          </svg>
          <span>فشرده‌سازی</span>
        </button>
        <button id="btn-file-extract" class="btn secondary" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20">
            <use href="#i-extract" />
          </svg>
          <span>استخراج</span>
        </button>
      </div>
