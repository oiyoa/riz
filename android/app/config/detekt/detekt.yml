build:
  maxIssues: 0
  excludeCorrectable: false

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 4
  CyclomaticComplexMethod:
    active: true
    threshold: 25
    ignoreSimpleWhenEntries: true
  LongMethod:
    active: true
    threshold: 250
  LongParameterList:
    active: true
    functionThreshold: 15
    constructorThreshold: 15
  LargeClass:
    active: true
    threshold: 600
  TooManyFunctions:
    active: true
    thresholdInFiles: 25
    thresholdInClasses: 25
    ignorePrivate: true

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '8'
      - '16'
      - '100'
      - '1024'
      - '0xFF'
      - '0x0F'
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: true
    ignoreConstantDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
  WildcardImport:
    active: true
    excludeImports:
      - 'kotlinx.android.synthetic.*'
      - 'androidx.compose.ui.graphics.*'
      - 'androidx.compose.material.icons.*'
      - 'androidx.compose.animation.*'
      - 'androidx.compose.foundation.layout.*'
      - 'androidx.compose.material3.*'
      - 'androidx.compose.runtime.*'
  MaxLineLength:
    active: true
    maxLineLength: 140
  UnusedImports:
    active: true
  ReturnCount:
    active: true
    max: 4
    excludedFunctions:
      - 'equals'

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*' # Allow uppercase for Composables
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'Error'
      - 'Throwable'
      - 'RuntimeException'
      - 'NullPointerException'

empty-blocks:
  active: true
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true
