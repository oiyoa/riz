name: Build Web

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Single-File HTML
        run: npm run build

      - name: Verify Build Output
        run: |
          test -f dist/index.html || (echo "❌ dist/index.html not found" && exit 1)
          FILE_SIZE=$(stat --printf="%s" dist/index.html)
          echo "✅ dist/index.html built successfully ($FILE_SIZE bytes)"

      - name: Set up Versioning
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV

      - name: Process Web Build
        working-directory: ./dist
        run: |
          mv index.html riz-${{ env.VERSION_NAME }}.html
          zip riz-${{ env.VERSION_NAME }}.zip riz-${{ env.VERSION_NAME }}.html
          echo "### Web Build Checksum" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          sha256sum riz-*.zip >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: |
            dist/riz-*.zip
